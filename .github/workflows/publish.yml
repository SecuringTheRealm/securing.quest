# File: .github/workflows/publish.yml
name: publish-to-github-pages
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/publish.yml"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.deploy_check.outputs.result }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Cache XML feeds
        id: xml_cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/xml-feed.xml
            .cache/xml-shorts-feed.xml
          key: xml-feeds-${{ hashFiles('.cache/xml-feed.xml', '.cache/xml-shorts-feed.xml') }}
          restore-keys: xml-feeds-

      - name: Fetch latest XML feeds
        run: |
          mkdir -p .cache
          curl -sL 'https://www.youtube.com/feeds/videos.xml?playlist_id=PLo9Ah7HeyG1QVWTBPzOROBQNqinh0ZPWv' -o .cache/current.xml
          curl -sL 'https://www.youtube.com/feeds/videos.xml?playlist_id=PLo9Ah7HeyG1Rkqq0cc1QJtttkywXKWd9g' -o .cache/current-shorts.xml

      - name: Check XML changes
        id: diff
        shell: bash
        run: |
          CHANGED=false
          if [ -f .cache/xml-feed.xml ]; then
            if ! diff -q .cache/xml-feed.xml .cache/current.xml > /dev/null; then
              CHANGED=true
            fi
          else
            CHANGED=true
          fi
          if [ -f .cache/xml-shorts-feed.xml ]; then
            if ! diff -q .cache/xml-shorts-feed.xml .cache/current-shorts.xml > /dev/null; then
              CHANGED=true
            fi
          else
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Update cached XML
        run: |
          mv .cache/current.xml .cache/xml-feed.xml
          mv .cache/current-shorts.xml .cache/xml-shorts-feed.xml

      - name: Check content and pages changes
        id: content_diff
        shell: bash
        run: |
          # Check if content or pages changed
          # For scheduled/manual runs, always check (no before commit available)
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "content_changed=true" >> "$GITHUB_OUTPUT"
          else
            # For push events, check what actually changed
            git fetch origin ${{ github.event.before }}
            if git diff --quiet ${{ github.event.before }} HEAD -- src/; then
              echo "content_changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "content_changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Determine if deployment needed
        id: deploy_check
        shell: bash
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ] || [ "${{ steps.content_diff.outputs.content_changed }}" = "true" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js 🟢
        if: steps.deploy_check.outputs.result == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun 🥟
        if: steps.deploy_check.outputs.result == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies ⚡
        if: steps.deploy_check.outputs.result == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies 🔧
        if: steps.deploy_check.outputs.result == 'true'
        run: bun install --frozen-lockfile

      - name: Setup Pages ⚙️
        if: steps.deploy_check.outputs.result == 'true'
        uses: actions/configure-pages@v4

      - name: Build with Astro 🏗️
        if: steps.deploy_check.outputs.result == 'true'
        run: bun run build

      - name: Send webmentions
        if: steps.deploy_check.outputs.result == 'true' && github.event_name == 'push'
        run: bun run send:webmentions

      - name: Commit sent webmentions tracking
        if: steps.deploy_check.outputs.result == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/sent-webmentions.json
          git diff --staged --quiet || git commit -m "chore: update sent webmentions tracking [skip ci]"
          git push

      - name: Upload artifact 📡
        if: steps.deploy_check.outputs.result == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.should_deploy == 'true'

    steps:
      - name: Publish to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
