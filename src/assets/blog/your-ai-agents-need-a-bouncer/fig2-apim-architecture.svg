    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="1100" height="620" rx="10" fill="#0C2D3A"/>

  <!-- ==================== TITLE ==================== -->
  <text x="550" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#D4A843">APIM AI Gateway - Reference Architecture</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" fill="#7B9EA8">Agent Frameworks  >  APIM AI Gateway  >  Backend Pool</text>

  <!-- ==================== COL 1: AGENTS ==================== -->
  <rect x="24" y="68" width="210" height="480" rx="10" fill="#082028" stroke="#1A4A58" stroke-width="1.5"/>
  <text x="129" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#D4A843">Agent Frameworks</text>

  <rect x="40" y="108" width="178" height="44" rx="8" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="129" y="127" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#E2E8F0">Copilot Studio</text>
  <text x="129" y="142" text-anchor="middle" font-size="9" fill="#7B9EA8">Low-code agents</text>

  <rect x="40" y="160" width="178" height="44" rx="8" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="129" y="179" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#E2E8F0">Foundry Agents</text>
  <text x="129" y="194" text-anchor="middle" font-size="9" fill="#7B9EA8">Azure AI Foundry</text>

  <rect x="40" y="212" width="178" height="44" rx="8" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="129" y="231" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#E2E8F0">Custom Agents</text>
  <text x="129" y="246" text-anchor="middle" font-size="9" fill="#7B9EA8">Semantic Kernel, LangChain</text>

  <rect x="40" y="264" width="178" height="44" rx="8" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="129" y="283" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#E2E8F0">A2A Agents</text>
  <text x="129" y="298" text-anchor="middle" font-size="9" fill="#7B9EA8">Agent-to-agent calls</text>

  <rect x="40" y="316" width="178" height="44" rx="8" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="129" y="335" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#E2E8F0">MCP Clients</text>
