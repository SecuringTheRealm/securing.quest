  <rect x="326" y="428" width="113" height="40" rx="6" fill="#0C2D3A" stroke="#D4A843" stroke-width="1"/>
  <text x="382" y="445" text-anchor="middle" font-size="9" font-weight="bold" fill="#E2E8F0">Entra Agent ID</text>
  <text x="382" y="459" text-anchor="middle" font-size="8" fill="#7B9EA8">Identity + Sponsors</text>

  <rect x="449" y="428" width="113" height="40" rx="6" fill="#0C2D3A" stroke="#D4A843" stroke-width="1"/>
  <text x="505" y="445" text-anchor="middle" font-size="9" font-weight="bold" fill="#E2E8F0">Agent Registry</text>
  <text x="505" y="459" text-anchor="middle" font-size="8" fill="#7B9EA8">Visibility + Audit</text>

  <rect x="326" y="478" width="113" height="40" rx="6" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="382" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#E2E8F0">API Center</text>
  <text x="382" y="509" text-anchor="middle" font-size="8" fill="#7B9EA8">MCP Registry</text>

  <rect x="449" y="478" width="113" height="40" rx="6" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="505" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#E2E8F0">App Insights</text>
  <text x="505" y="509" text-anchor="middle" font-size="8" fill="#7B9EA8">Observability</text>

  <!-- Legend -->
  <rect x="326" y="532" width="10" height="10" rx="2" fill="#0E3D3A" stroke="#5EEAD4" stroke-width="1"/>
  <text x="342" y="541" font-size="8.5" fill="#7B9EA8">GA</text>

  <rect x="370" y="532" width="10" height="10" rx="2" fill="#0C2D3A" stroke="#D4A843" stroke-width="1"/>
  <text x="386" y="541" font-size="8.5" fill="#7B9EA8">Preview</text>

  <rect x="424" y="532" width="10" height="10" rx="2" fill="#082028" stroke="#1A4A58" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="440" y="541" font-size="8.5" fill="#7B9EA8">External</text>

  <!-- ==================== FLOW: GATEWAY -> BACKENDS ==================== -->
  <line x1="562" y1="376" x2="650" y2="376" stroke="#7B9EA8" stroke-width="2.5" marker-end="url(#a1)"/>

  <!-- ==================== COL 3: BACKENDS ==================== -->
  <rect x="654" y="68" width="422" height="540" rx="10" fill="#082028" stroke="#1A4A58" stroke-width="1.5"/>
