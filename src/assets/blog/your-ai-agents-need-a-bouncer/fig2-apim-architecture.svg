  <rect x="40" y="368" width="178" height="54" rx="8" fill="#082028" stroke="#1A4A58" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="129" y="387" text-anchor="middle" font-size="10" font-weight="bold" fill="#D4A843">Multi-cloud</text>
  <text x="129" y="402" text-anchor="middle" font-size="9" fill="#7B9EA8">Google Vertex AI, AWS Bedrock</text>

