  <line x1="218" y1="130" x2="268" y2="172" stroke="#1A4A58" stroke-width="1"/>
  <line x1="218" y1="182" x2="268" y2="172" stroke="#1A4A58" stroke-width="1"/>
  <line x1="218" y1="234" x2="268" y2="172" stroke="#1A4A58" stroke-width="1"/>
  <line x1="218" y1="286" x2="268" y2="172" stroke="#1A4A58" stroke-width="1"/>
  <line x1="218" y1="338" x2="268" y2="172" stroke="#1A4A58" stroke-width="1"/>
  <circle cx="268" cy="172" r="4" fill="#5EEAD4"/>
  <line x1="272" y1="172" x2="306" y2="149" stroke="#7B9EA8" stroke-width="2.5" marker-end="url(#a1)"/>

  <!-- ==================== COL 2: APIM GATEWAY ==================== -->
  <rect x="310" y="68" width="268" height="540" rx="10" fill="#082028" stroke="#5EEAD4" stroke-width="2"/>
  <text x="444" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#5EEAD4">APIM AI Gateway</text>
  <text x="444" y="108" text-anchor="middle" font-size="9" fill="#7B9EA8">Single chokepoint for all agentic traffic</text>

  <!-- Pipeline steps -->
  <rect x="326" y="122" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="141" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">1. Authentication</text>
  <line x1="444" y1="150" x2="444" y2="158" stroke="#5EEAD4" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="326" y="162" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="181" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">2. Content Safety + Prompt Shield</text>
  <line x1="444" y1="190" x2="444" y2="198" stroke="#5EEAD4" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="326" y="202" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="221" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">3. Semantic Cache Lookup</text>
  <line x1="444" y1="230" x2="444" y2="238" stroke="#5EEAD4" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="326" y="242" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="261" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">4. Token Rate Limiting</text>
  <line x1="444" y1="270" x2="444" y2="278" stroke="#5EEAD4" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="326" y="282" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="301" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">5. Emit Token Metrics</text>
  <line x1="444" y1="310" x2="444" y2="318" stroke="#5EEAD4" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="326" y="322" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="341" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">6. Routing (Backend Pool)</text>
  <line x1="444" y1="350" x2="444" y2="358" stroke="#5EEAD4" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="326" y="362" width="236" height="28" rx="6" fill="#0E3D3A"/>
  <text x="444" y="381" text-anchor="middle" font-size="10" font-weight="bold" fill="#5EEAD4">7. Backend Auth (Managed Identity)</text>

