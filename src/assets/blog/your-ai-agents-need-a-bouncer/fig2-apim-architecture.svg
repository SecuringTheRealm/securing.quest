  <text x="865" y="108" text-anchor="middle" font-size="9" fill="#7B9EA8">Up to 30 backends - priority + weighted routing</text>

  <!-- Priority 1: PTU -->
  <rect x="670" y="120" width="390" height="114" rx="8" fill="#0C2D3A" stroke="#5EEAD4" stroke-width="1.2"/>
  <rect x="680" y="126" width="66" height="16" rx="4" fill="#0E3D3A"/>
  <text x="713" y="138" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#5EEAD4">Priority 1</text>
  <text x="765" y="138" font-size="9.5" fill="#E2E8F0" font-weight="bold">PTU (Provisioned Throughput)</text>

  <rect x="680" y="150" width="180" height="34" rx="6" fill="#082028" stroke="#1A4A58" stroke-width="1"/>
  <text x="770" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2E8F0">GPT-4o (East US)</text>
  <text x="770" y="178" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Weight: 70</text>

  <rect x="870" y="150" width="180" height="34" rx="6" fill="#082028" stroke="#1A4A58" stroke-width="1"/>
  <text x="960" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2E8F0">GPT-4o (West EU)</text>
  <text x="960" y="178" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Weight: 30</text>

  <rect x="680" y="192" width="370" height="26" rx="4" fill="#082028" stroke="#1A4A58" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="865" y="209" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Circuit breaker with acceptRetryAfter (one rule per backend)</text>

  <!-- Fallback -->
  <text x="865" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#D4A843">Fallback when higher-priority backends unavailable</text>
  <line x1="865" y1="255" x2="865" y2="270" stroke="#D4A843" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Priority 2: Serverless / PAYG -->
  <rect x="670" y="274" width="390" height="114" rx="8" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1.2"/>
  <rect x="680" y="280" width="66" height="16" rx="4" fill="#1A4A58"/>
  <text x="713" y="292" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#E2E8F0">Priority 2</text>
  <text x="765" y="292" font-size="9.5" fill="#E2E8F0" font-weight="bold">Serverless / Pay-as-you-go</text>

  <rect x="680" y="304" width="120" height="34" rx="6" fill="#082028" stroke="#1A4A58" stroke-width="1"/>
  <text x="740" y="319" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#E2E8F0">Mistral Large</text>
  <text x="740" y="332" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Weight: 40</text>

  <rect x="810" y="304" width="120" height="34" rx="6" fill="#082028" stroke="#1A4A58" stroke-width="1"/>
  <text x="870" y="319" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#E2E8F0">DeepSeek-R1</text>
  <text x="870" y="332" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Weight: 30</text>

  <rect x="940" y="304" width="110" height="34" rx="6" fill="#082028" stroke="#1A4A58" stroke-width="1"/>
  <text x="995" y="319" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#E2E8F0">Phi-4</text>
  <text x="995" y="332" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Weight: 30</text>

  <rect x="680" y="346" width="370" height="26" rx="4" fill="#082028" stroke="#1A4A58" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="865" y="363" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Circuit breaker with acceptRetryAfter (one rule per backend)</text>

  <!-- Additional backend types -->
  <rect x="670" y="404" width="190" height="42" rx="6" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="765" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2E8F0">MCP Servers</text>
  <text x="765" y="436" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Tools + Functions</text>

  <rect x="870" y="404" width="190" height="42" rx="6" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="965" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2E8F0">Content Safety</text>
  <text x="965" y="436" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Azure AI Content Safety</text>

  <rect x="670" y="454" width="190" height="42" rx="6" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="765" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2E8F0">Data + Vector Stores</text>
  <text x="765" y="486" text-anchor="middle" font-size="8.5" fill="#7B9EA8">RAG sources</text>

  <rect x="870" y="454" width="190" height="42" rx="6" fill="#0C2D3A" stroke="#1A4A58" stroke-width="1"/>
  <text x="965" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#E2E8F0">Managed Redis</text>
  <text x="965" y="486" text-anchor="middle" font-size="8.5" fill="#7B9EA8">Semantic cache store</text>

  <!-- Session-aware footer -->
  <rect x="670" y="506" width="390" height="22" rx="4" fill="#0E3D3A" stroke="#5EEAD4" stroke-width="0.8"/>
  <text x="865" y="521" text-anchor="middle" font-size="9" font-weight="bold" fill="#5EEAD4">Session-aware load balancing for stateful conversations (Preview)</text>

  <!-- Footer note -->
  <text x="865" y="548" text-anchor="middle" font-size="8" fill="#7B9EA8">Lower-priority backends used only when all higher-priority backends</text>
  <text x="865" y="560" text-anchor="middle" font-size="8" fill="#7B9EA8">are unavailable because circuit breaker rules are tripped</text>

  <!-- Attribution -->
  <text x="550" y="608" text-anchor="middle" font-size="8" fill="#1A4A58">securing.quest  |  Source: Microsoft Learn - Azure API Management AI Gateway</text>

